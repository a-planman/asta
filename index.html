<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsTa – AsiointiTabletti</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f6f8;
      color: #222;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 12px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 10px;
      margin-bottom: 10px;
      padding: 0 20px;
      flex-wrap: wrap;
    }

    .logo {
      height: 80px;
      width: auto;
      border-radius: 10px;
    }

    .logo-text {
      text-align: left;
    }

    .logo-main {
      font-size: 28px;
      font-weight: bold;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 16px;
      color: #555;
      margin-top: 4px;
      line-height: 1.2;
    }

    h1 {
      margin: 16px 20px 4px 20px;
      font-size: 38px;
      font-weight: bold;
    }

    h2 {
      margin: 0 20px 28px 20px;
      font-size: 24px;
      font-weight: normal;
      color: #444;
    }

    .button-container {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 40px auto;
    }

    .button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 14px auto;
      padding: 18px 20px;
      font-size: 24px;
      font-weight: bold;
      background-color: #2d6cdf;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .button:active {
      transform: scale(0.98);
    }

    .info-box {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background-color: #ffffff;
      border: 2px solid #2d6cdf;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.4;
      color: #222;
      text-align: left;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      max-width: 240px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }

    @media (max-width: 900px) {
      .logo {
        height: 70px;
      }

      .logo-main {
        font-size: 24px;
      }

      .logo-sub {
        font-size: 15px;
      }

      h1 {
        font-size: 32px;
      }

      h2 {
        font-size: 21px;
      }

      .button {
        font-size: 22px;
        padding: 16px 18px;
      }
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
      }

      .logo-text {
        text-align: center;
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 20px;
      }

      .button-container {
        max-width: 90%;
      }

      .button {
        font-size: 20px;
      }

      .info-box {
        max-width: 200px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="diki-logo.png" alt="DiKi-logo" class="logo">
    <div class="logo-text">
      <div class="logo-main">Digiin kiinni</div>
      <div class="logo-sub">Digilaitteiden kierrätyksellä</div>
    </div>
  </div>

  <h1>AsTa – AsiointiTabletti</h1>
  <h2>Peruspalvelut</h2>

  <div class="button-container">
    <a href="https://www.op.fi/" class="button">Pankki (OP)</a>
    <a href="https://www.omasavo.fi/" class="button">OmaSavo</a>
    <a href="https://www.suomi.fi/" class="button">Suomi.fi</a>
    <a href="https://www.kanta.fi/" class="button">OmaKanta</a>
    <a href="https://www.vero.fi/omavero/" class="button">OmaVero</a>
    <a href="https://poliisi.fi/" class="button">Poliisi</a>
  </div>

  <div class="info-box">
    <div class="info-title">Tarvitsetko apua?</div>
    DiKi ry:n tukipalvelu<br>
    tuki.diki2026@gmail.com
  </div>

</body>
</html>
