<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>AsTa – AsiointiTabletti</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f6f8;
      margin: 0;
    }

    .logo {
      position: fixed;
      top: 10px;
      left: 10px;
      height: 50px;
    }

    h1 {
      margin-top: 20px;
      font-size: 22px;
    }

    .subtitle {
      margin-bottom: 15px;
      color: #555;
      font-size: 14px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px;
    }

    .card {
      background: #ffffff;
      padding: 15px;
      border-radius: 10px;
      width: 260px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card h2 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .bank-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button {
      display: block;
      padding: 10px;
      font-size: 16px;
      background-color: #2d6cdf;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .footer {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

<img src="diki-logo.png" class="logo">

<h1>AsTa – AsiointiTabletti</h1>
<div class="subtitle">Peruspalvelut turvalliseen verkkoasiointiin</div>

<div class="container">

  <!-- PANKIT -->
  <div class="card">
    <h2>Pankit</h2>

    <div class="bank-buttons">

      <!-- Vasen sarake -->
      <a href="https://www.op.fi/" class="button">OP</a>
      <a href="https://www.saastopankki.fi/" class="button">Säästöpankki</a>

      <a href="https://www.poppankki.fi/" class="button">POP Pankki</a>
      <a href="https://www.omasp.fi/" class="button">OmaSP</a>

      <a href="https://www.nordea.fi/" class="button">Nordea</a>
      <a href="https://www.aktia.fi/" class="button">Aktia</a>

      <a href="https://www.danskebank.fi/" class="button">Danske Bank</a>
      <a href="https://www.s-pankki.fi/" class="button">S-Pankki</a>

    </div>
  </div>

  <!-- MUUT PALVELUT -->
  <div class="card">
    <h2>Muut palvelut</h2>

    <a href="https://www.omasavo.fi/" class="button">OmaSavo</a>
    <a href="https://www.kanta.fi/omakanta" class="button">OmaKanta</a>
    <a href="https://www.suomi.fi/" class="button">Suomi.fi</a>
    <a href="https://www.vero.fi/" class="button">OmaVero</a>
    <a href="https://poliisi.fi/" class="button">Poliisi</a>
    <a href="https://www.kela.fi/" class="button">Kela</a>

  </div>

</div>

<div class="footer">
  DiKi ry:n tukipalvelu<br>
  tuki.diki2026@gmail.com
</div>

</body>
</html>
