<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AsTa – AsiointiTabletti</title>

  <style>
    :root {
      --bg: #eef1f4;
      --card: #f8f8f8;
      --text: #111111;
      --subtext: #666666;
      --blue: #3b6fd8;
      --blue-hover: #2f5fc0;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
      --radius-card: 20px;
      --radius-button: 18px;
      --button-height: 60px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 20px 28px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .logo {
      width: 140px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .title-block {
      min-width: 0;
    }

    .title-block h1 {
      margin: 0 0 6px 0;
      font-size: clamp(30px, 4vw, 42px);
      line-height: 1.1;
      font-weight: 700;
      text-align: center;
    }

    .title-block p {
      margin: 0;
      font-size: clamp(18px, 2.4vw, 24px);
      color: var(--subtext);
      line-height: 1.25;
      text-align: center;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 28px;
      align-items: stretch;
      min-width: 0;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      padding: 20px 22px 22px;
      min-width: 0;
    }

    .card h2 {
      margin: 0 0 14px 0;
      text-align: center;
      font-size: clamp(24px, 2.6vw, 28px);
      font-weight: 700;
      color: #000;
    }

    .bank-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 14px;
      min-width: 0;
    }

    .columns-inside {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      min-width: 0;
    }

    .column {
      min-width: 0;
    }

    .column h3 {
      margin: 0 0 14px 0;
      text-align: center;
      font-size: clamp(20px, 2vw, 24px);
      font-weight: 700;
      color: #0b3a7a;
      line-height: 1.2;
    }

    .service-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: var(--button-height);
      padding: 8px 12px;
      background: var(--blue);
      color: #ffffff;
      text-decoration: none;
      border: none;
      border-radius: var(--radius-button);
      font-size: clamp(20px, 2.1vw, 24px);
      font-weight: 400;
      line-height: 1.15;
      text-align: center;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: break-word;
      transition: background 0.15s ease;
      appearance: none;
      -webkit-appearance: none;
      min-width: 0;
    }

    .button:hover,
    .button:focus {
      background: var(--blue-hover);
      outline: none;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      color: var(--subtext);
      font-size: clamp(16px, 1.8vw, 18px);
      line-height: 1.4;
    }

    @media (max-width: 980px) {
      .main-grid,
      .columns-inside {
        grid-template-columns: 1fr;
      }

      .page {
        padding: 18px 16px 24px;
      }

      .button {
        height: 58px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px 12px 20px;
      }

      .header {
        gap: 12px;
        margin-bottom: 18px;
      }

      .logo {
        width: 110px;
      }

      .bank-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 18px 14px 20px;
      }

      .button {
        height: 60px;
        font-size: 21px;
      }

      .footer {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <img src="diki-logo.png" alt="DiKi logo" class="logo" />
      <div class="title-block">
        <h1>AsTa – AsiointiTabletti</h1>
        <p>Väline turvalliseen verkkoasiointiin</p>
      </div>
    </header>

    <main class="main-grid">

      <section class="card">
        <h2>Pankit</h2>
        <div class="bank-grid">
          <a class="button" href="https://www.op.fi">OP</a>
          <a class="button" href="https://www.saastopankki.fi">Säästöpankki</a>
          <a class="button" href="https://www.poppankki.fi">POP Pankki</a>
          <a class="button" href="https://www.omasp.fi">OmaSP</a>
          <a class="button" href="https://www.nordea.fi">Nordea</a>
          <a class="button" href="https://www.aktia.fi">Aktia</a>
          <a class="button" href="https://www.danskebank.fi">Danske Bank</a>
          <a class="button" href="https://www.s-pankki.fi">S-Pankki</a>
        </div>
      </section>

      <section class="card">
        <h2>Palvelut</h2>
        <div class="columns-inside">

          <div class="column">
            <h3>Terveyspalvelut</h3>
            <div class="service-stack">
              <a class="button" href="https://www.kanta.fi/omakanta">OmaKanta</a>
              <a class="button" href="https://www.pshyvinvointialue.fi/omasavo">OmaSavo</a>
              <a class="button" href="https://www.kela.fi">Kela</a>
              <a class="button" href="https://www.islab.fi">Islab</a>
            </div>
          </div>

          <div class="column">
            <h3>Muut palvelut</h3>
            <div class="service-stack">
              <a class="button" href="https://www.suomi.fi">Suomi.fi</a>
              <a class="button" href="https://www.vero.fi/omavero">OmaVero</a>
              <a class="button" href="https://poliisi.fi">Poliisi</a>
            </div>
          </div>

        </div>
      </section>

    </main>

    <footer class="footer">
      DiKi ry:n tukipalvelu<br />
      tuki.diki2026@gmail.com
    </footer>

  </div>
</body>
</html>
